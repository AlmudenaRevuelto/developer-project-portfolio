<VirtualHost *:80>
    ServerAdmin localhost
    DocumentRoot /var/www/html/frontend/public
    <Directory /var/www/html/frontend/public>
        AllowOverride All
        Require all granted
    </Directory>
    Alias /api /var/www/html/backend/public

    <Directory /var/www/html/backend/public>
        AllowOverride All
        Require all granted
    </Directory>

</VirtualHost>